<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- 背景: 明るい琥珀ゴールド -->
  <rect width="32" height="32" rx="6" fill="#F5A623"/>

  <!-- 羽根ペン（白でくっきり） -->
  <!-- 羽根の主体 -->
  <path d="M26 3 C30 2 32 8 27 16 C24.5 12 20 12 18 16 C15.5 11.5 18 6 26 3Z" fill="white" opacity="0.95"/>
  <!-- 羽根の軸 -->
  <path d="M25 3.5 C23 8 21 12 18.5 18" stroke="#C07A10" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- 羽根の細部ライン -->
  <path d="M23 6 C24.5 8 25.5 11 26 14" stroke="white" stroke-width="0.6" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M20 8 C21.5 10 22.5 13 23 16" stroke="white" stroke-width="0.5" fill="none" opacity="0.4" stroke-linecap="round"/>

  <!-- ペン先 -->
  <polygon points="18.5,18 16,23 21,20" fill="#2D1E0A"/>
  <!-- ペン先のハイライト -->
  <line x1="17.5" y1="20" x2="20" y2="19" stroke="#F5A623" stroke-width="0.7" stroke-linecap="round"/>

  <!-- 筆記ライン（書いている感じ） -->
  <line x1="5" y1="22" x2="15" y2="22" stroke="#2D1E0A" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
  <line x1="5" y1="26" x2="13" y2="26" stroke="#2D1E0A" stroke-width="1.8" stroke-linecap="round" opacity="0.7"/>
  <line x1="5" y1="30" x2="11" y2="30" stroke="#2D1E0A" stroke-width="1.8" stroke-linecap="round" opacity="0.5"/>
</svg>
