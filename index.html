<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小説家のジャーナル</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1a1614;
      --bg2: #221e1b;
      --bg3: #2d2824;
      --border: #3d3530;
      --accent: #c9966a;
      --accent2: #8b5e3c;
      --text: #e8ddd4;
      --text2: #a89080;
      --text3: #7a6050;
      --red: #c0614a;
      --green: #7aaa6e;
      --blue: #6a9ec9;
      --yellow: #c9b46a;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ===== SCROLLBAR ===== */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ===== HEADER ===== */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo {
      font-size: 1.4rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo span { font-size: 1.6rem; }
    .header-date { color: var(--text2); font-size: 0.85rem; font-family: sans-serif; }

    /* ===== NAV TABS ===== */
    .nav-tabs {
      display: flex;
      gap: 4px;
      background: var(--bg2);
      padding: 0 28px;
      border-bottom: 1px solid var(--border);
    }
    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text2);
      font-size: 0.9rem;
      padding: 13px 18px;
      cursor: pointer;
      transition: all 0.2s;
      font-family: sans-serif;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ===== MAIN LAYOUT ===== */
    main { flex: 1; padding: 28px; max-width: 1100px; margin: 0 auto; width: 100%; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ===== CARDS ===== */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 18px;
    }
    .card-title {
      font-size: 0.8rem;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 14px;
      font-family: sans-serif;
    }

    /* ===== FORM ELEMENTS ===== */
    label { display: block; font-size: 0.85rem; color: var(--text2); margin-bottom: 6px; font-family: sans-serif; }
    input[type="text"], input[type="number"], input[type="date"], textarea, select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 10px 13px;
      font-size: 0.95rem;
      font-family: 'Hiragino Mincho ProN', 'Yu Mincho', Georgia, serif;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { min-height: 120px; }
    .form-row { display: grid; gap: 14px; margin-bottom: 14px; }
    .form-row.cols2 { grid-template-columns: 1fr 1fr; }
    .form-row.cols3 { grid-template-columns: 1fr 1fr 1fr; }

    /* ===== BUTTONS ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      border-radius: 6px;
      border: none;
      font-size: 0.88rem;
      cursor: pointer;
      font-family: sans-serif;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: #1a1614; font-weight: 600; }
    .btn-primary:hover { background: #d9a67a; }
    .btn-ghost { background: transparent; color: var(--text2); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid transparent; }
    .btn-danger:hover { border-color: var(--red); }
    .btn-sm { padding: 5px 10px; font-size: 0.8rem; }

    /* ===== GRID ===== */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
    .grid3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }

    /* ===== STAT CARDS ===== */
    .stat-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      text-align: center;
    }
    .stat-num { font-size: 2rem; color: var(--accent); font-weight: 700; font-family: sans-serif; }
    .stat-label { font-size: 0.78rem; color: var(--text3); margin-top: 4px; font-family: sans-serif; }

    /* ===== PROGRESS BAR ===== */
    .progress-wrap { background: var(--bg3); border-radius: 999px; height: 8px; overflow: hidden; margin-top: 8px; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--accent2), var(--accent)); border-radius: 999px; transition: width 0.5s; }

    /* ===== LOG LIST ===== */
    .log-list { display: flex; flex-direction: column; gap: 12px; }
    .log-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      position: relative;
    }
    .log-item:hover { border-color: var(--accent2); }
    .log-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; font-family: sans-serif; }
    .log-date { font-size: 0.8rem; color: var(--text3); }
    .log-wc { font-size: 0.82rem; background: var(--accent2); color: #fff; padding: 2px 8px; border-radius: 4px; }
    .log-mood { font-size: 1rem; }
    .log-title { font-size: 1rem; color: var(--accent); margin-bottom: 6px; }
    .log-text { font-size: 0.9rem; color: var(--text2); line-height: 1.7; white-space: pre-wrap; }
    .log-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .tag { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 2px 8px; font-size: 0.75rem; color: var(--text3); font-family: sans-serif; }
    .log-actions { position: absolute; top: 12px; right: 14px; display: flex; gap: 4px; }

    /* ===== INSPIRATION CARDS ===== */
    .inspo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
    .inspo-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      position: relative;
      transition: border-color 0.2s;
    }
    .inspo-card:hover { border-color: var(--accent2); }
    .inspo-category {
      display: inline-block;
      font-size: 0.72rem;
      font-family: sans-serif;
      padding: 2px 9px;
      border-radius: 4px;
      margin-bottom: 8px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .cat-plot    { background: rgba(106,158,201,0.2); color: var(--blue); }
    .cat-char    { background: rgba(122,170,110,0.2); color: var(--green); }
    .cat-world   { background: rgba(201,180,106,0.2); color: var(--yellow); }
    .cat-phrase  { background: rgba(201,97,74,0.2);  color: var(--red); }
    .cat-other   { background: rgba(160,130,100,0.2); color: var(--text2); }
    .inspo-text { font-size: 0.9rem; color: var(--text); line-height: 1.7; white-space: pre-wrap; }
    .inspo-date { font-size: 0.75rem; color: var(--text3); margin-top: 10px; font-family: sans-serif; }
    .inspo-actions { position: absolute; top: 10px; right: 10px; }

    /* ===== GOAL SECTION ===== */
    .goal-item {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
    }
    .goal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .goal-name { font-size: 1rem; color: var(--text); }
    .goal-pct { font-size: 0.85rem; color: var(--accent); font-family: sans-serif; font-weight: 600; }
    .goal-detail { font-size: 0.82rem; color: var(--text3); font-family: sans-serif; margin-top: 8px; }
    .goal-actions { display: flex; gap: 6px; margin-top: 10px; }

    /* ===== MOOD BUTTONS ===== */
    .mood-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .mood-btn {
      background: var(--bg3);
      border: 2px solid transparent;
      border-radius: 6px;
      font-size: 1.5rem;
      padding: 6px 10px;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
    }
    .mood-btn:hover { border-color: var(--border); }
    .mood-btn.selected { border-color: var(--accent); background: var(--bg2); }

    /* ===== EMPTY STATE ===== */
    .empty-state { text-align: center; padding: 50px 20px; color: var(--text3); font-family: sans-serif; }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.9rem; }

    /* ===== SEARCH ===== */
    .search-bar { position: relative; margin-bottom: 18px; }
    .search-bar input { padding-left: 36px; }
    .search-bar .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 0.9rem; font-family: sans-serif; }

    /* ===== SECTION HEADER ===== */
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .section-title { font-size: 1.1rem; color: var(--text); }

    /* ===== MODAL ===== */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }
    .modal-title { font-size: 1.1rem; color: var(--accent); margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--bg3);
      border: 1px solid var(--accent);
      border-radius: 8px;
      padding: 12px 20px;
      font-family: sans-serif;
      font-size: 0.88rem;
      color: var(--text);
      z-index: 999;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 700px) {
      .grid2, .grid3 { grid-template-columns: 1fr; }
      .form-row.cols2, .form-row.cols3 { grid-template-columns: 1fr; }
      main { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo"><span>📖</span> 小説家のジャーナル</div>
  <div class="header-date" id="headerDate"></div>
</header>

<!-- NAV TABS -->
<div class="nav-tabs">
  <button class="tab-btn active" onclick="switchTab('dashboard')">ダッシュボード</button>
  <button class="tab-btn" onclick="switchTab('log')">執筆ログ</button>
  <button class="tab-btn" onclick="switchTab('goals')">目標管理</button>
  <button class="tab-btn" onclick="switchTab('inspo')">インスピレーション</button>
</div>

<main>

  <!-- ===== DASHBOARD TAB ===== -->
  <div class="tab-panel active" id="tab-dashboard">
    <div class="grid3" id="statGrid" style="margin-bottom:22px;"></div>
    <div class="grid2">
      <!-- 今日の執筆 -->
      <div>
        <div class="card">
          <div class="card-title">今日の執筆記録</div>
          <div class="form-row">
            <div>
              <label>タイトル / 作品名</label>
              <input type="text" id="quick-title" placeholder="例: 第3章 嵐の夜" />
            </div>
          </div>
          <div class="form-row cols2">
            <div>
              <label>文字数</label>
              <input type="number" id="quick-wc" placeholder="0" min="0" />
            </div>
            <div>
              <label>今日の気分</label>
              <div class="mood-row" id="moodRow">
                <button class="mood-btn" data-mood="✨" onclick="selectMood(this)">✨</button>
                <button class="mood-btn" data-mood="😊" onclick="selectMood(this)">😊</button>
                <button class="mood-btn" data-mood="😐" onclick="selectMood(this)">😐</button>
                <button class="mood-btn" data-mood="😔" onclick="selectMood(this)">😔</button>
                <button class="mood-btn" data-mood="🔥" onclick="selectMood(this)">🔥</button>
                <button class="mood-btn" data-mood="💤" onclick="selectMood(this)">💤</button>
              </div>
            </div>
          </div>
          <div class="form-row">
            <div>
              <label>今日のメモ・気づき</label>
              <textarea id="quick-note" placeholder="今日書いた内容、詰まったこと、アイデアなど…" style="min-height:90px;"></textarea>
            </div>
          </div>
          <div class="form-row">
            <div>
              <label>タグ（カンマ区切り）</label>
              <input type="text" id="quick-tags" placeholder="例: 第3章, キャラクター, 会話" />
            </div>
          </div>
          <button class="btn btn-primary" onclick="saveQuickLog()">📝 記録を保存</button>
        </div>
      </div>

      <!-- 目標進捗 -->
      <div>
        <div class="card">
          <div class="card-title">目標の進捗</div>
          <div id="dashGoals"></div>
        </div>
        <div class="card" style="margin-top:18px;">
          <div class="card-title">最近の執筆ログ</div>
          <div id="recentLogs"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== LOG TAB ===== -->
  <div class="tab-panel" id="tab-log">
    <div class="section-header">
      <div class="section-title">執筆ログ</div>
      <button class="btn btn-primary btn-sm" onclick="openLogModal()">＋ 新しい記録</button>
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="logSearch" placeholder="ログを検索…" oninput="renderLogs()" />
    </div>
    <div id="logList" class="log-list"></div>
  </div>

  <!-- ===== GOALS TAB ===== -->
  <div class="tab-panel" id="tab-goals">
    <div class="section-header">
      <div class="section-title">目標管理</div>
      <button class="btn btn-primary btn-sm" onclick="openGoalModal()">＋ 新しい目標</button>
    </div>
    <div id="goalList"></div>
  </div>

  <!-- ===== INSPO TAB ===== -->
  <div class="tab-panel" id="tab-inspo">
    <div class="section-header">
      <div class="section-title">インスピレーションメモ</div>
      <button class="btn btn-primary btn-sm" onclick="openInspoModal()">＋ メモを追加</button>
    </div>
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="inspoSearch" placeholder="メモを検索…" oninput="renderInspo()" />
    </div>
    <div class="inspo-grid" id="inspoGrid"></div>
  </div>

</main>

<!-- ===== MODALS ===== -->

<!-- Log Modal -->
<div class="modal-overlay" id="logModal">
  <div class="modal">
    <div class="modal-title">📝 執筆ログを追加</div>
    <input type="hidden" id="log-edit-id" />
    <div class="form-row">
      <div>
        <label>日付</label>
        <input type="date" id="log-date" />
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>タイトル / 作品名</label>
        <input type="text" id="log-title" placeholder="例: 第3章 嵐の夜" />
      </div>
    </div>
    <div class="form-row cols2">
      <div>
        <label>文字数</label>
        <input type="number" id="log-wc" placeholder="0" min="0" />
      </div>
      <div>
        <label>気分</label>
        <div class="mood-row" id="moodRowModal">
          <button class="mood-btn" data-mood="✨" onclick="selectMoodModal(this)">✨</button>
          <button class="mood-btn" data-mood="😊" onclick="selectMoodModal(this)">😊</button>
          <button class="mood-btn" data-mood="😐" onclick="selectMoodModal(this)">😐</button>
          <button class="mood-btn" data-mood="😔" onclick="selectMoodModal(this)">😔</button>
          <button class="mood-btn" data-mood="🔥" onclick="selectMoodModal(this)">🔥</button>
          <button class="mood-btn" data-mood="💤" onclick="selectMoodModal(this)">💤</button>
        </div>
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>メモ・気づき</label>
        <textarea id="log-note" placeholder="今日書いた内容、気づき、詰まったことなど…"></textarea>
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>タグ（カンマ区切り）</label>
        <input type="text" id="log-tags" placeholder="例: 第3章, 伏線, 感情描写" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('logModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveLog()">保存</button>
    </div>
  </div>
</div>

<!-- Goal Modal -->
<div class="modal-overlay" id="goalModal">
  <div class="modal">
    <div class="modal-title">🎯 目標を設定</div>
    <input type="hidden" id="goal-edit-id" />
    <div class="form-row">
      <div>
        <label>目標名</label>
        <input type="text" id="goal-name" placeholder="例: 第1章を完成させる" />
      </div>
    </div>
    <div class="form-row cols2">
      <div>
        <label>種類</label>
        <select id="goal-type">
          <option value="wordcount">文字数</option>
          <option value="chapter">章数</option>
          <option value="days">執筆日数</option>
          <option value="custom">カスタム</option>
        </select>
      </div>
      <div>
        <label>目標値</label>
        <input type="number" id="goal-target" placeholder="例: 50000" min="1" />
      </div>
    </div>
    <div class="form-row cols2">
      <div>
        <label>現在の進捗</label>
        <input type="number" id="goal-current" placeholder="0" min="0" />
      </div>
      <div>
        <label>単位</label>
        <input type="text" id="goal-unit" placeholder="例: 文字, 章, 日" />
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>期限（任意）</label>
        <input type="date" id="goal-deadline" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('goalModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveGoal()">保存</button>
    </div>
  </div>
</div>

<!-- Update Progress Modal -->
<div class="modal-overlay" id="progressModal">
  <div class="modal">
    <div class="modal-title">📊 進捗を更新</div>
    <input type="hidden" id="prog-goal-id" />
    <div class="form-row">
      <div>
        <label>現在の進捗</label>
        <input type="number" id="prog-value" placeholder="0" min="0" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('progressModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveProgress()">更新</button>
    </div>
  </div>
</div>

<!-- Inspo Modal -->
<div class="modal-overlay" id="inspoModal">
  <div class="modal">
    <div class="modal-title">💡 インスピレーションを記録</div>
    <input type="hidden" id="inspo-edit-id" />
    <div class="form-row">
      <div>
        <label>カテゴリ</label>
        <select id="inspo-category">
          <option value="plot">プロット</option>
          <option value="char">キャラクター</option>
          <option value="world">世界観・設定</option>
          <option value="phrase">印象的なフレーズ</option>
          <option value="other">その他</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>タイトル（任意）</label>
        <input type="text" id="inspo-title" placeholder="例: 主人公の動機" />
      </div>
    </div>
    <div class="form-row">
      <div>
        <label>内容</label>
        <textarea id="inspo-text" placeholder="アイデア、セリフ、情景描写、キャラクターの特徴…"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('inspoModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveInspo()">保存</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== DATA =====
let data = {
  logs: [],
  goals: [],
  inspo: []
};

function load() {
  try {
    const saved = localStorage.getItem('novelist_journal_v1');
    if (saved) data = JSON.parse(saved);
  } catch(e) {}
}
function save() {
  localStorage.setItem('novelist_journal_v1', JSON.stringify(data));
}

// ===== UTILS =====
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openModal(id) { document.getElementById(id).classList.add('open'); }
document.querySelectorAll('.modal-overlay').forEach(m => {
  m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); });
});

// ===== TABS =====
function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.currentTarget.classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'log') renderLogs();
  if (name === 'goals') renderGoals();
  if (name === 'inspo') renderInspo();
}

// ===== MOOD =====
let selectedMood = '';
let selectedMoodModal = '';
function selectMood(btn) {
  document.querySelectorAll('#moodRow .mood-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedMood = btn.dataset.mood;
}
function selectMoodModal(btn) {
  document.querySelectorAll('#moodRowModal .mood-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedMoodModal = btn.dataset.mood;
}

// ===== DASHBOARD =====
function renderDashboard() {
  // Stats
  const totalWC = data.logs.reduce((s, l) => s + (parseInt(l.wordcount) || 0), 0);
  const todayLogs = data.logs.filter(l => l.date === today());
  const todayWC = todayLogs.reduce((s, l) => s + (parseInt(l.wordcount) || 0), 0);
  const streak = calcStreak();
  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${todayWC.toLocaleString()}</div><div class="stat-label">今日の文字数</div></div>
    <div class="stat-card"><div class="stat-num">${totalWC.toLocaleString()}</div><div class="stat-label">累計文字数</div></div>
    <div class="stat-card"><div class="stat-num">${streak}</div><div class="stat-label">連続執筆日数 🔥</div></div>
  `;

  // Goals
  const gl = document.getElementById('dashGoals');
  if (data.goals.length === 0) {
    gl.innerHTML = '<div style="color:var(--text3);font-size:0.85rem;font-family:sans-serif;padding:8px 0;">目標がありません。<br>「目標管理」タブで追加しましょう。</div>';
  } else {
    gl.innerHTML = data.goals.map(g => {
      const pct = Math.min(100, Math.round(((g.current||0) / (g.target||1)) * 100));
      return `<div style="margin-bottom:14px;">
        <div style="display:flex;justify-content:space-between;font-size:0.88rem;margin-bottom:4px;font-family:sans-serif;">
          <span style="color:var(--text);">${g.name}</span>
          <span style="color:var(--accent);">${pct}%</span>
        </div>
        <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
        <div style="font-size:0.75rem;color:var(--text3);margin-top:4px;font-family:sans-serif;">${(g.current||0).toLocaleString()} / ${(g.target||0).toLocaleString()} ${g.unit||''}</div>
      </div>`;
    }).join('');
  }

  // Recent logs
  const rl = document.getElementById('recentLogs');
  const recent = [...data.logs].sort((a,b) => b.date.localeCompare(a.date)).slice(0, 3);
  if (recent.length === 0) {
    rl.innerHTML = '<div style="color:var(--text3);font-size:0.85rem;font-family:sans-serif;padding:8px 0;">まだ記録がありません。</div>';
  } else {
    rl.innerHTML = recent.map(l => `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
        <span style="font-size:1.2rem;">${l.mood||'📖'}</span>
        <div style="flex:1;">
          <div style="font-size:0.88rem;color:var(--text);">${l.title||'無題'}</div>
          <div style="font-size:0.75rem;color:var(--text3);font-family:sans-serif;">${fmtDate(l.date)} · ${(parseInt(l.wordcount)||0).toLocaleString()}字</div>
        </div>
      </div>
    `).join('');
  }
}

function calcStreak() {
  const dates = [...new Set(data.logs.map(l => l.date))].sort().reverse();
  if (dates.length === 0) return 0;
  let streak = 0;
  let cur = new Date();
  cur.setHours(0,0,0,0);
  for (let i = 0; i < 365; i++) {
    const d = cur.toISOString().split('T')[0];
    if (dates.includes(d)) { streak++; }
    else if (streak === 0 && i === 0) { /* today not written yet, check */ }
    else if (streak === 0) break;
    else break;
    cur.setDate(cur.getDate() - 1);
  }
  return streak;
}

// ===== QUICK LOG =====
function saveQuickLog() {
  const title = document.getElementById('quick-title').value.trim();
  const wc = document.getElementById('quick-wc').value;
  const note = document.getElementById('quick-note').value.trim();
  const tags = document.getElementById('quick-tags').value.split(',').map(t => t.trim()).filter(Boolean);
  const entry = {
    id: uid(), date: today(), title: title || '無題',
    wordcount: parseInt(wc) || 0, mood: selectedMood,
    note, tags
  };
  data.logs.unshift(entry);
  save();
  document.getElementById('quick-title').value = '';
  document.getElementById('quick-wc').value = '';
  document.getElementById('quick-note').value = '';
  document.getElementById('quick-tags').value = '';
  document.querySelectorAll('#moodRow .mood-btn').forEach(b => b.classList.remove('selected'));
  selectedMood = '';
  renderDashboard();
  showToast('✅ 記録を保存しました！');
}

// ===== LOGS =====
function openLogModal(id) {
  document.getElementById('log-edit-id').value = id || '';
  document.getElementById('log-date').value = today();
  document.getElementById('log-title').value = '';
  document.getElementById('log-wc').value = '';
  document.getElementById('log-note').value = '';
  document.getElementById('log-tags').value = '';
  document.querySelectorAll('#moodRowModal .mood-btn').forEach(b => b.classList.remove('selected'));
  selectedMoodModal = '';
  if (id) {
    const l = data.logs.find(x => x.id === id);
    if (l) {
      document.getElementById('log-date').value = l.date;
      document.getElementById('log-title').value = l.title;
      document.getElementById('log-wc').value = l.wordcount;
      document.getElementById('log-note').value = l.note;
      document.getElementById('log-tags').value = (l.tags||[]).join(', ');
      selectedMoodModal = l.mood || '';
      document.querySelectorAll('#moodRowModal .mood-btn').forEach(b => {
        if (b.dataset.mood === l.mood) b.classList.add('selected');
      });
    }
  }
  openModal('logModal');
}

function saveLog() {
  const id = document.getElementById('log-edit-id').value;
  const entry = {
    id: id || uid(),
    date: document.getElementById('log-date').value || today(),
    title: document.getElementById('log-title').value.trim() || '無題',
    wordcount: parseInt(document.getElementById('log-wc').value) || 0,
    mood: selectedMoodModal,
    note: document.getElementById('log-note').value.trim(),
    tags: document.getElementById('log-tags').value.split(',').map(t=>t.trim()).filter(Boolean)
  };
  if (id) {
    const i = data.logs.findIndex(x => x.id === id);
    if (i !== -1) data.logs[i] = entry;
  } else {
    data.logs.unshift(entry);
  }
  save();
  closeModal('logModal');
  renderLogs();
  showToast('✅ ログを保存しました！');
}

function deleteLog(id) {
  if (!confirm('このログを削除しますか？')) return;
  data.logs = data.logs.filter(x => x.id !== id);
  save();
  renderLogs();
  showToast('🗑 削除しました');
}

function renderLogs() {
  const q = (document.getElementById('logSearch')?.value || '').toLowerCase();
  let logs = [...data.logs].sort((a,b) => b.date.localeCompare(a.date));
  if (q) logs = logs.filter(l =>
    (l.title||'').toLowerCase().includes(q) ||
    (l.note||'').toLowerCase().includes(q) ||
    (l.tags||[]).some(t => t.toLowerCase().includes(q))
  );
  const el = document.getElementById('logList');
  if (logs.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="icon">📝</div><p>まだ執筆ログがありません。<br>記録を始めましょう！</p></div>`;
    return;
  }
  el.innerHTML = logs.map(l => `
    <div class="log-item">
      <div class="log-actions">
        <button class="btn btn-ghost btn-sm" onclick="openLogModal('${l.id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteLog('${l.id}')">🗑</button>
      </div>
      <div class="log-meta">
        <span class="log-date">${fmtDate(l.date)}</span>
        ${l.wordcount ? `<span class="log-wc">${parseInt(l.wordcount).toLocaleString()}字</span>` : ''}
        ${l.mood ? `<span class="log-mood">${l.mood}</span>` : ''}
      </div>
      <div class="log-title">${l.title||'無題'}</div>
      ${l.note ? `<div class="log-text">${escHtml(l.note)}</div>` : ''}
      ${(l.tags||[]).length ? `<div class="log-tags">${l.tags.map(t=>`<span class="tag">${escHtml(t)}</span>`).join('')}</div>` : ''}
    </div>
  `).join('');
}

// ===== GOALS =====
function openGoalModal(id) {
  document.getElementById('goal-edit-id').value = id || '';
  document.getElementById('goal-name').value = '';
  document.getElementById('goal-type').value = 'wordcount';
  document.getElementById('goal-target').value = '';
  document.getElementById('goal-current').value = '';
  document.getElementById('goal-unit').value = '';
  document.getElementById('goal-deadline').value = '';
  if (id) {
    const g = data.goals.find(x => x.id === id);
    if (g) {
      document.getElementById('goal-name').value = g.name;
      document.getElementById('goal-type').value = g.type;
      document.getElementById('goal-target').value = g.target;
      document.getElementById('goal-current').value = g.current || 0;
      document.getElementById('goal-unit').value = g.unit || '';
      document.getElementById('goal-deadline').value = g.deadline || '';
    }
  }
  openModal('goalModal');
}

function saveGoal() {
  const id = document.getElementById('goal-edit-id').value;
  const typeVal = document.getElementById('goal-type').value;
  const unitDefaults = { wordcount: '文字', chapter: '章', days: '日', custom: '' };
  const entry = {
    id: id || uid(),
    name: document.getElementById('goal-name').value.trim() || '新しい目標',
    type: typeVal,
    target: parseInt(document.getElementById('goal-target').value) || 0,
    current: parseInt(document.getElementById('goal-current').value) || 0,
    unit: document.getElementById('goal-unit').value.trim() || unitDefaults[typeVal] || '',
    deadline: document.getElementById('goal-deadline').value || ''
  };
  if (id) {
    const i = data.goals.findIndex(x => x.id === id);
    if (i !== -1) data.goals[i] = entry;
  } else {
    data.goals.push(entry);
  }
  save();
  closeModal('goalModal');
  renderGoals();
  showToast('🎯 目標を保存しました！');
}

function openProgressModal(id) {
  document.getElementById('prog-goal-id').value = id;
  const g = data.goals.find(x => x.id === id);
  document.getElementById('prog-value').value = g ? g.current || 0 : 0;
  openModal('progressModal');
}

function saveProgress() {
  const id = document.getElementById('prog-goal-id').value;
  const val = parseInt(document.getElementById('prog-value').value) || 0;
  const g = data.goals.find(x => x.id === id);
  if (g) { g.current = val; save(); }
  closeModal('progressModal');
  renderGoals();
  renderDashboard();
  showToast('📊 進捗を更新しました！');
}

function deleteGoal(id) {
  if (!confirm('この目標を削除しますか？')) return;
  data.goals = data.goals.filter(x => x.id !== id);
  save();
  renderGoals();
  showToast('🗑 削除しました');
}

function renderGoals() {
  const el = document.getElementById('goalList');
  if (data.goals.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🎯</div><p>目標がまだありません。<br>執筆の目標を設定しましょう！</p></div>`;
    return;
  }
  el.innerHTML = data.goals.map(g => {
    const pct = Math.min(100, Math.round(((g.current||0) / (g.target||1)) * 100));
    const done = pct >= 100;
    let deadline = '';
    if (g.deadline) {
      const today_d = new Date(); today_d.setHours(0,0,0,0);
      const dl = new Date(g.deadline + 'T00:00:00');
      const diff = Math.round((dl - today_d) / 86400000);
      if (diff < 0) deadline = `<span style="color:var(--red);font-size:0.78rem;">期限切れ</span>`;
      else if (diff === 0) deadline = `<span style="color:var(--yellow);font-size:0.78rem;">今日が期限</span>`;
      else deadline = `<span style="font-size:0.78rem;">残り ${diff}日</span>`;
    }
    return `<div class="goal-item" style="${done ? 'border-color:var(--green);' : ''}">
      <div class="goal-header">
        <span class="goal-name">${done ? '✅ ' : ''}${escHtml(g.name)}</span>
        <span class="goal-pct">${pct}%</span>
      </div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%;${done ? 'background:var(--green);' : ''}"></div></div>
      <div class="goal-detail">
        ${(g.current||0).toLocaleString()} / ${(g.target||0).toLocaleString()} ${escHtml(g.unit||'')}
        ${g.deadline ? ` &nbsp;·&nbsp; 期限: ${fmtDate(g.deadline)} ${deadline}` : ''}
      </div>
      <div class="goal-actions">
        <button class="btn btn-ghost btn-sm" onclick="openProgressModal('${g.id}')">📊 進捗更新</button>
        <button class="btn btn-ghost btn-sm" onclick="openGoalModal('${g.id}')">✏️ 編集</button>
        <button class="btn btn-danger btn-sm" onclick="deleteGoal('${g.id}')">🗑</button>
      </div>
    </div>`;
  }).join('');
}

// ===== INSPO =====
const CAT_LABELS = { plot: 'プロット', char: 'キャラクター', world: '世界観・設定', phrase: 'フレーズ', other: 'その他' };
const CAT_CLASSES = { plot: 'cat-plot', char: 'cat-char', world: 'cat-world', phrase: 'cat-phrase', other: 'cat-other' };

function openInspoModal(id) {
  document.getElementById('inspo-edit-id').value = id || '';
  document.getElementById('inspo-category').value = 'plot';
  document.getElementById('inspo-title').value = '';
  document.getElementById('inspo-text').value = '';
  if (id) {
    const m = data.inspo.find(x => x.id === id);
    if (m) {
      document.getElementById('inspo-category').value = m.category;
      document.getElementById('inspo-title').value = m.title || '';
      document.getElementById('inspo-text').value = m.text;
    }
  }
  openModal('inspoModal');
}

function saveInspo() {
  const id = document.getElementById('inspo-edit-id').value;
  const entry = {
    id: id || uid(),
    date: today(),
    category: document.getElementById('inspo-category').value,
    title: document.getElementById('inspo-title').value.trim(),
    text: document.getElementById('inspo-text').value.trim()
  };
  if (!entry.text) { showToast('⚠️ 内容を入力してください'); return; }
  if (id) {
    const i = data.inspo.findIndex(x => x.id === id);
    if (i !== -1) data.inspo[i] = entry;
  } else {
    data.inspo.unshift(entry);
  }
  save();
  closeModal('inspoModal');
  renderInspo();
  showToast('💡 メモを保存しました！');
}

function deleteInspo(id) {
  if (!confirm('このメモを削除しますか？')) return;
  data.inspo = data.inspo.filter(x => x.id !== id);
  save();
  renderInspo();
  showToast('🗑 削除しました');
}

function renderInspo() {
  const q = (document.getElementById('inspoSearch')?.value || '').toLowerCase();
  let items = [...data.inspo];
  if (q) items = items.filter(m =>
    (m.title||'').toLowerCase().includes(q) ||
    (m.text||'').toLowerCase().includes(q)
  );
  const el = document.getElementById('inspoGrid');
  if (items.length === 0) {
    el.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><div class="icon">💡</div><p>インスピレーションメモがありません。<br>思いついたことをすぐに記録しましょう！</p></div>`;
    return;
  }
  el.innerHTML = items.map(m => `
    <div class="inspo-card">
      <div class="inspo-actions">
        <button class="btn btn-ghost btn-sm" onclick="openInspoModal('${m.id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="deleteInspo('${m.id}')">🗑</button>
      </div>
      <span class="inspo-category ${CAT_CLASSES[m.category]||'cat-other'}">${CAT_LABELS[m.category]||m.category}</span>
      ${m.title ? `<div style="font-size:0.95rem;color:var(--accent);margin-bottom:6px;">${escHtml(m.title)}</div>` : ''}
      <div class="inspo-text">${escHtml(m.text)}</div>
      <div class="inspo-date">${fmtDate(m.date)}</div>
    </div>
  `).join('');
}

// ===== HELPERS =====
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== INIT =====
function init() {
  load();
  const d = new Date();
  document.getElementById('headerDate').textContent = d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
  renderDashboard();
}

init();
</script>
